<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">

        <meta name="viewport"
              content="width=device-width, initial-scale=1">

        <title>Add Transaction</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
              rel="stylesheet">

    </head>

    <body>

        <nav class="navbar navbar-dark bg-dark">

            <div class="container">

                <span class="navbar-brand">
                    Personal Finance Tracker
                </span>

            </div>
       
        </nav>

        <div class="container mt-4">

            <div class="row justify-content-center">
                
                <div class="col-md-6">
                     
                    <div class="card shadow">

                    <div class="card-header">

                        <h3>Add Transaction</h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Amount
                                </label>

                                <input type="number"
                                step="0.01"
                                class="form-control"
                                name="amount"
                                required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Category
                                </label>

                                <input type="text"
                                class="form-control"
                                name="category"
                                required>
                                
                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Type
                                </label>

                               <select
                               class="form-select"
                               name="type">

                               <option value="income">
                                Income
                               </option>

                               <option value="expense">
                                Expense
                               </option>

                                </select>   
                               
                            </div>

                            <button 
                            type="submit"
                            class="btn btn-success">

                            Add Transaction

                        </button>

                        <a href="/" class="btn btn-secondary">
                            Back
                        </a>

                        </form>

                    </div>

                </div>

            </div>
       
        </div>
    
    </div>

</div>

</body>
</html>
